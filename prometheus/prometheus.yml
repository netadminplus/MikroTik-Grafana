global:
  scrape_interval: 30s
  evaluation_interval: 30s
  external_labels:
    monitor: 'mikrotik-monitor'

scrape_configs:
  # Prometheus self-monitoring
  - job_name: 'prometheus'
    static_configs:
      - targets: ['localhost:9090']

  # SNMP Exporter self-monitoring
  - job_name: 'snmp_exporter'
    static_configs:
      - targets: ['snmp_exporter:9116']

  # MikroTik Router monitoring via SNMP Exporter
  - job_name: 'mikrotik'
    static_configs:
      # Replace with your MikroTik router IP address
      - targets:
          - 192.168.88.1
    metrics_path: /snmp
    params:
      auth: [public_v2]
      module: [mikrotik]
    relabel_configs:
      - source_labels: [__address__]
        target_label: __param_target
      - source_labels: [__param_target]
        target_label: instance
      - target_label: __address__
        replacement: snmp_exporter:9116
