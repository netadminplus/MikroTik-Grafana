# SNMP Exporter configuration for MikroTik RouterOS v7
# Optimized for essential metrics only to avoid timeouts

auths:
  public_v2:
    community: public
    security_level: noAuthNoPriv
    version: 2

modules:
  mikrotik:
    walk:
      # System information
      - 1.3.6.1.2.1.1.1      # sysDescr
      - 1.3.6.1.2.1.1.3      # sysUpTime
      - 1.3.6.1.2.1.1.4      # sysContact
      - 1.3.6.1.2.1.1.5      # sysName
      - 1.3.6.1.2.1.1.6      # sysLocation
      
      # Interfaces - essential metrics only
      - 1.3.6.1.2.1.2.2.1.2   # ifDescr
      - 1.3.6.1.2.1.2.2.1.7   # ifAdminStatus
      - 1.3.6.1.2.1.2.2.1.8   # ifOperStatus
      - 1.3.6.1.2.1.2.2.1.10  # ifInOctets
      - 1.3.6.1.2.1.2.2.1.11  # ifInUcastPkts
      - 1.3.6.1.2.1.2.2.1.13  # ifInDiscards
      - 1.3.6.1.2.1.2.2.1.14  # ifInErrors
      - 1.3.6.1.2.1.2.2.1.16  # ifOutOctets
      - 1.3.6.1.2.1.2.2.1.17  # ifOutUcastPkts
      - 1.3.6.1.2.1.2.2.1.19  # ifOutDiscards
      - 1.3.6.1.2.1.2.2.1.20  # ifOutErrors
      
      # TCP Connections
      - 1.3.6.1.2.1.6.9       # tcpCurrEstab
      - 1.3.6.1.2.1.6.5       # tcpActiveOpens
      - 1.3.6.1.2.1.6.6       # tcpPassiveOpens
      
      # Host Resources - Memory
      - 1.3.6.1.2.1.25.2.2    # hrMemorySize
      
      # MikroTik specific (Enterprise OID: 1.3.6.1.4.1.14988)
      - 1.3.6.1.4.1.14988.1.1.3.1     # mtxrCpuLoad
      - 1.3.6.1.4.1.14988.1.1.3.4     # mtxrMemoryTotal
      - 1.3.6.1.4.1.14988.1.1.3.5     # mtxrMemoryUsed
      - 1.3.6.1.4.1.14988.1.1.3.6     # mtxrMemoryFree
      - 1.3.6.1.4.1.14988.1.1.3.7     # mtxrDiskSize
      - 1.3.6.1.4.1.14988.1.1.3.8     # mtxrDiskUsed
      - 1.3.6.1.4.1.14988.1.1.3.9     # mtxrDiskFree
      - 1.3.6.1.4.1.14988.1.1.3.10    # mtxrHealthTemperature
      - 1.3.6.1.4.1.14988.1.1.8.1     # mtxrConnectionTrackingCount

    get:
      - 1.3.6.1.2.1.1.1.0    # sysDescr
      - 1.3.6.1.2.1.1.3.0    # sysUpTime
      - 1.3.6.1.2.1.1.4.0    # sysContact
      - 1.3.6.1.2.1.1.5.0    # sysName
      - 1.3.6.1.2.1.1.6.0    # sysLocation

    metrics:
      # System metrics
      - name: sysDescr
        oid: 1.3.6.1.2.1.1.1
        type: DisplayString
        help: System description
      - name: sysUpTime
        oid: 1.3.6.1.2.1.1.3
        type: gauge
        help: System uptime in hundredths of seconds
      - name: sysContact
        oid: 1.3.6.1.2.1.1.4
        type: DisplayString
        help: System contact
      - name: sysName
        oid: 1.3.6.1.2.1.1.5
        type: DisplayString
        help: System name
      - name: sysLocation
        oid: 1.3.6.1.2.1.1.6
        type: DisplayString
        help: System location
      
      # Interface metrics
      - name: ifDescr
        oid: 1.3.6.1.2.1.2.2.1.2
        type: DisplayString
        help: Interface description
        indexes:
          - labelname: ifIndex
            type: gauge
      - name: ifAdminStatus
        oid: 1.3.6.1.2.1.2.2.1.7
        type: gauge
        help: Interface admin status (1=up, 2=down, 3=testing)
        indexes:
          - labelname: ifIndex
            type: gauge
      - name: ifOperStatus
        oid: 1.3.6.1.2.1.2.2.1.8
        type: gauge
        help: Interface operational status (1=up, 2=down)
        indexes:
          - labelname: ifIndex
            type: gauge
      - name: ifInOctets
        oid: 1.3.6.1.2.1.2.2.1.10
        type: counter
        help: Total octets received on interface
        indexes:
          - labelname: ifIndex
            type: gauge
      - name: ifInUcastPkts
        oid: 1.3.6.1.2.1.2.2.1.11
        type: counter
        help: Unicast packets received
        indexes:
          - labelname: ifIndex
            type: gauge
      - name: ifInDiscards
        oid: 1.3.6.1.2.1.2.2.1.13
        type: counter
        help: Inbound packets discarded
        indexes:
          - labelname: ifIndex
            type: gauge
      - name: ifInErrors
        oid: 1.3.6.1.2.1.2.2.1.14
        type: counter
        help: Inbound packets with errors
        indexes:
          - labelname: ifIndex
            type: gauge
      - name: ifOutOctets
        oid: 1.3.6.1.2.1.2.2.1.16
        type: counter
        help: Total octets transmitted
        indexes:
          - labelname: ifIndex
            type: gauge
      - name: ifOutUcastPkts
        oid: 1.3.6.1.2.1.2.2.1.17
        type: counter
        help: Unicast packets transmitted
        indexes:
          - labelname: ifIndex
            type: gauge
      - name: ifOutDiscards
        oid: 1.3.6.1.2.1.2.2.1.19
        type: counter
        help: Outbound packets discarded
        indexes:
          - labelname: ifIndex
            type: gauge
      - name: ifOutErrors
        oid: 1.3.6.1.2.1.2.2.1.20
        type: counter
        help: Outbound packets with errors
        indexes:
          - labelname: ifIndex
            type: gauge
      
      # TCP metrics
      - name: tcpCurrEstab
        oid: 1.3.6.1.2.1.6.9
        type: gauge
        help: Current established TCP connections
      - name: tcpActiveOpens
        oid: 1.3.6.1.2.1.6.5
        type: counter
        help: TCP connections initiated in active state
      - name: tcpPassiveOpens
        oid: 1.3.6.1.2.1.6.6
        type: counter
        help: TCP connections initiated in passive state
      
      # Memory
      - name: hrMemorySize
        oid: 1.3.6.1.2.1.25.2.2
        type: gauge
        help: Total physical memory in KB
      
      # MikroTik CPU
      - name: mtxrCpuLoad
        oid: 1.3.6.1.4.1.14988.1.1.3.1
        type: gauge
        help: CPU load percentage
      
      # MikroTik Memory
      - name: mtxrMemoryTotal
        oid: 1.3.6.1.4.1.14988.1.1.3.4
        type: gauge
        help: Total memory in bytes
      - name: mtxrMemoryUsed
        oid: 1.3.6.1.4.1.14988.1.1.3.5
        type: gauge
        help: Used memory in bytes
      - name: mtxrMemoryFree
        oid: 1.3.6.1.4.1.14988.1.1.3.6
        type: gauge
        help: Free memory in bytes
      
      # MikroTik Disk
      - name: mtxrDiskSize
        oid: 1.3.6.1.4.1.14988.1.1.3.7
        type: gauge
        help: Total disk size in bytes
      - name: mtxrDiskUsed
        oid: 1.3.6.1.4.1.14988.1.1.3.8
        type: gauge
        help: Used disk space in bytes
      - name: mtxrDiskFree
        oid: 1.3.6.1.4.1.14988.1.1.3.9
        type: gauge
        help: Free disk space in bytes
      
      # MikroTik Health
      - name: mtxrHealthTemperature
        oid: 1.3.6.1.4.1.14988.1.1.3.10
        type: gauge
        help: Device temperature in Celsius
      
      # MikroTik Connection Tracking
      - name: mtxrConnectionTrackingCount
        oid: 1.3.6.1.4.1.14988.1.1.8.1
        type: gauge
        help: Number of tracked connections
